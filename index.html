<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>spotify premium | jatuh suka</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sp-green: #1DB954;
            --sp-black: #121212;
            --sp-dark: #191414;
            --sp-grey: #282828;
            --sp-light: #b3b3b3;
            --sp-white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--sp-black);
            color: var(--sp-white);
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Navigasi Atas */
        .top-nav { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav-btn { cursor: pointer; font-size: 1.2rem; transition: 0.3s; }

        /* Tampilan Utama */
        .main-view { flex: 1; padding: 0 25px; text-align: center; overflow-y: auto; position: relative; }
        .album-art {
            width: 85%; max-width: 300px; aspect-ratio: 1/1;
            margin: 20px auto; border-radius: 12px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            overflow: hidden; transition: 0.5s ease;
        }
        .album-art img { width: 100%; height: 100%; object-fit: cover; }
        .album-art.playing { transform: scale(1.05); border: 2px solid var(--sp-green); }

        .song-info { text-align: left; margin: 25px 0; }
        .song-info h1 { font-size: 1.4rem; font-weight: 700; text-transform: lowercase; }
        .song-info p { color: var(--sp-light); font-size: 0.9rem; margin-top: 5px; text-transform: lowercase; }

        /* Lirik */
        .lyrics-container {
            height: 140px; overflow: hidden; margin-bottom: 20px;
            mask-image: linear-gradient(transparent, black 20%, black 80%, transparent);
        }
        #lyricTrack { transition: transform 0.5s ease-out; }
        .lyric-line {
            font-size: 1.2rem; font-weight: 700; padding: 12px 0;
            color: rgba(255,255,255,0.1); transition: 0.4s;
            text-transform: lowercase;
        }
        .lyric-line.active { color: var(--sp-green); transform: scale(1.1); }

        /* Player Bar & Progress */
        .player-bar { background: var(--sp-dark); padding: 25px 20px; border-top: 1px solid #282828; }
        .progress-container { margin-bottom: 20px; cursor: pointer; padding: 10px 0; width: 100%; }
        .progress-bg { height: 4px; background: #4f4f4f; border-radius: 2px; position: relative; }
        .progress-fill { height: 100%; background: var(--sp-white); width: 0%; border-radius: 2px; position: relative; pointer-events: none; }
        
        .time-display { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--sp-light); margin-top: 8px; }

        .btns-group { display: flex; justify-content: space-between; align-items: center; max-width: 400px; margin: 0 auto; }
        .btn-icon { cursor: pointer; color: var(--sp-light); font-size: 1.2rem; }
        .play-btn { font-size: 3.5rem; color: var(--sp-white); cursor: pointer; }

        /* Overlay Awal */
        #startScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }
        .green-btn {
            background: var(--sp-green); color: black; border: none;
            padding: 15px 45px; border-radius: 30px; font-weight: bold; cursor: pointer;
            text-transform: lowercase;
        }

        /* Custom Message Popup (MUNCUL PAS KLIK PLAY) */
        #msgPopup {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000;
            display: none; justify-content: center; align-items: center;
            padding: 30px; backdrop-filter: blur(5px);
        }
        .msg-content {
            background: var(--sp-grey); padding: 25px; border-radius: 15px;
            text-align: center; max-width: 400px; line-height: 1.6;
            font-size: 0.95rem; color: var(--sp-white); text-transform: lowercase;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .close-msg {
            margin-top: 20px; background: var(--sp-green); color: black;
            border: none; padding: 10px 25px; border-radius: 20px;
            font-weight: bold; cursor: pointer; text-transform: lowercase;
        }
    </style>
</head>
<body>

    <div id="startScreen">
        <i class="fab fa-spotify" style="font-size: 70px; color: var(--sp-green);"></i>
        <button class="green-btn" onclick="openSpotify()">start listening</button>
    </div>

    <div id="msgPopup">
        <div class="msg-content">
            <p id="pesanTeks"></p>
            <button class="close-msg" onclick="closePopup()">mengerti</button>
        </div>
    </div>

    <nav class="top-nav">
        <i class="fas fa-chevron-down nav-btn"></i>
        <div style="text-align: center; font-size: 0.65rem; text-transform: lowercase;">playing from playlist<br><b>perfect person</b></div>
        <i class="fas fa-ellipsis-v nav-btn"></i>
    </nav>

    <div class="main-view">
        <div class="album-art" id="artBox">
            <img src="img/adikk.jpg" alt="keyla">
        </div>
        <div class="song-info">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1>jatuh suka</h1>
                    <p>tulus</p>
                </div>
                <i class="far fa-heart btn-icon" id="heartBtn" onclick="btnAction('like', this)"></i>
            </div>
        </div>
        <div class="lyrics-container">
            <div id="lyricTrack"></div>
        </div>
    </div>

    <div class="player-bar">
        <div class="progress-container" id="progContainer" onmousedown="seek(event)">
            <div class="progress-bg">
                <div class="progress-fill" id="progFill"></div>
            </div>
            <div class="time-display">
                <span id="curTime">0:00</span>
                <span id="totalDur">0:00</span>
            </div>
        </div>

        <div class="btns-group">
            <i class="fas fa-random btn-icon"></i>
            <i class="fas fa-step-backward btn-icon" onclick="skipTime(-10)"></i>
            <i class="fas fa-play-circle play-btn" id="playIcon" onclick="handlePlayClick()"></i>
            <i class="fas fa-step-forward btn-icon" onclick="skipTime(10)"></i>
            <i class="fas fa-redo btn-icon"></i>
        </div>
    </div>

    <audio id="audio" src="audio/tulus.mp3" preload="auto"></audio>

    <script>
        const audio = document.getElementById('audio');
        const lyricTrack = document.getElementById('lyricTrack');
        const progFill = document.getElementById('progFill');
        const playIcon = document.getElementById('playIcon');
        const artBox = document.getElementById('artBox');
        const msgPopup = document.getElementById('msgPopup');
        
        let messageShown = false;

        const teksCinta = "akuu milih lagu ini bukan cuma karena lagunya indah, tapi karena setiap liriknya ngingetin akuu sama kamuu, tentang gimana seseorang bisa hadir lalu tanpa sadar bikin hati jatuh pelan pelan hanya dengan cara dia jadi dirinya sendiri. bagian “ini semua bukan salahmu” itu yang paling kena buat akuu, karena jujur rasa sayang akuu ke kamuu juga begitu, bukan sesuatu yang akuu rencanain, bukan sesuatu yang akuu paksain, tapi datang sendiri karena kamuu punya cara yang selalu bikin hati akuu pulang ke kamuu. dari cara kamuu ngomong, cara kamuu marah, cara kamuu ngambek, sampai cara kamuu bikin akuu khawatir, semuanya bikin akuu makin sadar kalau kamuu memang seberarti itu buat akuu. jadi setiap akuu denger lagu ini, yang kebayang bukan cuma liriknya, tapi kamuu, karena tanpa kamuu sadar, kamuu udah jadi seseorang yang pelan pelan bikin hati akuu jatuh dan memilih kamuu lagi setiap hari.";

        const lyrics = [
            { t: 0, txt: "🎵 (instrumental magis...)" },
            { t: 11, txt: "sungguh ku tidak memiliki daya..." },
            { t: 20, txt: "di depan harummu..." },
            { t: 22, txt: "sungguh terkunci kata yang tertata..." },
            { t: 31, txt: "di depan ragamu..." },
            { t: 32, txt: "hu-uuuu..." },
            { t: 43, txt: "bila kau lihat ku tanpa sengaja..." },
            { t: 52, txt: "beginikah surga?" },
            { t: 54, txt: "bayangkan bila kau ajakku bicara..." },
            { t: 64, txt: "ini semua bukan salahmu," },
            { t: 70, txt: "punya magis perekat yang sekuat itu." },
            { t: 75, txt: "dari lahir sudah begitu..." },
            { t: 80, txt: "maafkan... aku jatuh suka." },
            { t: 95, txt: "bila kau lihat ku tanpa sengaja..." },
            { t: 105, txt: "beginikah surga?" },
            { t: 108, txt: "bayangkan bila kau ajakku bicara..." },
            { t: 117, txt: "ini semua bukan salahmu," },
            { t: 123, txt: "punya magis perekat yang sekuat itu." },
            { t: 128, txt: "dari lahir sudah begitu..." },
            { t: 133, txt: "maafkan... aku jatuh suka." },
            { t: 149, txt: "bila kau berkenan biarkanku di sampingmu," },
            { t: 160, txt: "berkuranglah satu jiwa yang sepi..." },
            { t: 170, txt: "ini semua bukan salahmu," },
            { t: 176, txt: "punya magis perekat yang sekuat itu." },
            { t: 183, txt: "dari lahir sudah begitu..." },
            { t: 186, txt: "maafkan... oh uh..." },
            { t: 191, txt: "ini semua bukan salahmu," },
            { t: 197, txt: "punya magis perekat yang sekuat itu." },
            { t: 203, txt: "dari lahir sudah begitu..." },
            { t: 208, txt: "maafkan... aku jatuh suka." },
            { t: 210, txt: "i love you, adikkk." }
        ];

        lyrics.forEach((l, i) => {
            const div = document.createElement('div');
            div.className = 'lyric-line';
            div.id = `l-${i}`;
            div.innerText = l.txt;
            lyricTrack.appendChild(div);
        });

        function openSpotify() {
            document.getElementById('startScreen').style.display = 'none';
        }

        function handlePlayClick() {
            if (!messageShown) {
                document.getElementById('pesanTeks').innerText = teksCinta;
                msgPopup.style.display = 'flex';
                messageShown = true;
                // Musik jalan saat popup muncul
                if(audio.paused) togglePlay();
            } else {
                togglePlay();
            }
        }

        function closePopup() {
            msgPopup.style.display = 'none';
        }

        function togglePlay() {
            if(audio.paused) {
                audio.play();
                playIcon.className = 'fas fa-pause-circle play-btn';
                artBox.classList.add('playing');
            } else {
                audio.pause();
                playIcon.className = 'fas fa-play-circle play-btn';
                artBox.classList.remove('playing');
            }
        }

        // MAJU MUNDUR lewat tombol (+/- 10 detik)
        function skipTime(seconds) {
            audio.currentTime += seconds;
        }

        // MAJU MUNDUR lewat Progress Bar (Klik Langsung)
        function seek(event) {
            const container = document.getElementById('progContainer');
            const rect = container.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const width = rect.width;
            const percentage = x / width;
            audio.currentTime = percentage * audio.duration;
        }

        audio.ontimeupdate = () => {
            const cur = audio.currentTime;
            const dur = audio.duration;
            progFill.style.width = (cur / dur * 100) + '%';
            document.getElementById('curTime').innerText = format(cur);
            if(dur) document.getElementById('totalDur').innerText = format(dur);

            lyrics.forEach((l, i) => {
                if(cur >= l.t) {
                    document.querySelectorAll('.lyric-line').forEach(el => el.classList.remove('active'));
                    const line = document.getElementById(`l-${i}`);
                    if(line) {
                        line.classList.add('active');
                        lyricTrack.style.transform = `translateY(-${line.offsetTop - 40}px)`;
                    }
                }
            });
        };

        function format(s) {
            let m = Math.floor(s/60);
            let sec = Math.floor(s%60);
            return `${m}:${sec < 10 ? '0'+sec : sec}`;
        }

        function btnAction(type, el) {
            if(type === 'like') {
                el.classList.toggle('fas'); el.classList.toggle('far');
                el.style.color = el.classList.contains('fas') ? '#1DB954' : '#b3b3b3';
            }
        }
    </script>
</body>
</html>
